services:
  backend:
    build:
      context: ./backend/freementors
      dockerfile: Dockerfile
    container_name: freementors-api
    environment:
      DJANGO_SETTINGS_MODULE: freementors_project.settings
      SECRET_KEY: ${SECRET_KEY:-dev-only-change-me}
      DEBUG: ${DEBUG:-True}
      PORT: 8000
    ports:
      - "8000:8000"
    volumes:
      - ./backend/freementors:/app
    command: >
      sh -c "python manage.py migrate --run-syncdb &&
             python manage.py seed_db &&
             python manage.py runserver 0.0.0.0:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: freementors-web
    ports:
      - "5173:80"
    depends_on:
      - backend
